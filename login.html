  <div class="site-shell">
    <header class="site-header">
      <a href="index.html" class="brand">
        <span class="brand-mark">SC</span>
        <div>

          <p>Smarter group expense sharing</p>
        </div>

      <nav class="main-nav" aria-label="Main navigation">
        <a href="login.html" class="active-link">Log In</a>

      </nav>
    </header>

    <main class="auth-page auth-page-static">
      <div class="form-panel">
        <p class="eyebrow">Welcome Back</p>
        <h2>Log in to continue</h2>
        <form id="loginForm" class="stack">
          <label>
            <span>Email</span>
            <input type="email" id="loginEmail" placeholder="Enter your email" required>
          </label>
          <label>
            <span>Password</span>
            <span class="field-row">
              <input type="password" id="loginPassword" placeholder="Enter your password" required>
              <button class="field-action" type="button" data-toggle-password data-target="loginPassword" aria-label="Show password">
                Show
              </button>
            </span>
          </label>
          <button id="loginSubmit" type="submit">Log In</button>
        </form>
        <p class="auth-alt">
          New here? <a href="signup.html">Create an account</a>
        </p>
        <div class="auth-divider" aria-hidden="true">
          <span>or</span>
        </div>
        <div id="googleLoginSection" class="google-login-section">
