<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | SplitCircle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <script src="theme.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <a href="index.html" class="brand">
        <span class="brand-mark">SC</span>
        <div>
          <strong>SplitCircle</strong>
          <p>Smarter group expense sharing</p>
        </div>
      </a>
      <nav class="main-nav" aria-label="Main navigation">
        <a href="login.html">Log In</a>
        <a href="signup.html" class="active-link">Sign Up</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact Us</a>
        <a href="customization.html">Customization</a>
        <a href="app.html" class="nav-cta" data-protected-link>Get Started</a>
        <a href="index.html" class="nav-logout">Log Out</a>
      </nav>
    </header>

    <main class="auth-page auth-page-static">
      <div class="form-panel">
        <p class="eyebrow">Create Account</p>
        <h2>Sign up for SplitCircle</h2>
        <form id="signupForm" class="stack">
          <label>
            <span>Full name</span>
            <input type="text" id="signupName" placeholder="Enter your name" required>
          </label>
          <label>
            <span>Email</span>
            <input type="email" id="signupEmail" placeholder="Enter your email" required>
          </label>
          <label>
            <span>Password</span>
            <span class="field-row">
              <input type="password" id="signupPassword" placeholder="Create your password" required>
              <button class="field-action" type="button" data-toggle-password data-target="signupPassword" aria-label="Show password">
                Show
              </button>
            </span>
          </label>
          <button id="signupSubmit" type="submit">Sign Up</button>
        </form>
        <p class="auth-alt">
          Already have an account? <a href="login.html">Log in</a>
        </p>
        <p id="signupMessage" class="form-message"></p>
      </div>
    </main>
  </div>

  <script src="auth.js"></script>
  <script src="site.js"></script>
</body>
</html>
